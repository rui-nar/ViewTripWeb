services:
  viewtripweb:
    image: ghcr.io/rui-nar/viewtripweb:latest
    ports:
      - "8000:8000"   # FastAPI backend
    volumes:
      - /volume1/docker/viewtripweb/data:/app/data      # per-user project files
      - /volume1/docker/viewtripweb/config:/app/config  # config.json with Strava credentials
      - /volume1/docker/viewtripweb/db:/app/db          # SQLite database
    environment:
      - DATABASE_URL=sqlite:////app/db/viewtripweb.db
      - STRAVA_REDIRECT_URI=https://your-domain/api/strava/callback
      - FRONTEND_ORIGIN=https://your-domain
    restart: unless-stopped
