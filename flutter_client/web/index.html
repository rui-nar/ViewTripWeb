<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ViewTrip — Merge · Visualise · Export">

  <!-- Google Sign-In (required by google_sign_in_web) -->
  <meta name="google-signin-client_id" content="544571555396-gj0q3hndadfo00ifotme305jcf4ii5cc.apps.googleusercontent.com">

  <!-- Start DNS + TLS for Google Fonts CDN before Flutter boots -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Loading indicator shown until Flutter engine renders its first frame -->
  <style>
    body { margin: 0; background: #0D1B2A; }
    #fl-loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #fl-loading::after {
      content: '';
      width: 36px; height: 36px;
      border: 3px solid #1e3a5f;
      border-top-color: #1D6CF6;
      border-radius: 50%;
      animation: vt-spin 0.8s linear infinite;
    }
    @keyframes vt-spin { to { transform: rotate(360deg); } }
  </style>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="viewtrip_client">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ViewTrip</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="fl-loading"></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
