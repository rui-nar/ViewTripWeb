name: viewtrip_client
description: ViewTripWeb Flutter client — web, Android, iOS.
publish_to: 'none'

version: 0.13.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.2

  # Navigation
  go_router: ^17.1.0

  # State management
  provider: ^6.1.2

  # Auth
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3

  # File picking (web + native)
  file_picker: ^10.3.10

  # Open URLs in browser (Strava OAuth connect)
  url_launcher: ^6.3.0
  url_launcher_web: ^2.3.3
  web: ^1.1.0

  # Persist user preferences (theme mode)
  shared_preferences: ^2.3.2

  # Map + charts
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_map:
  suppress_osm_warning: true
