name: viewtrip_client
description: ViewTripWeb Flutter client — web, Android, iOS.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.2

  # Navigation
  go_router: ^14.0.0

  # State management
  provider: ^6.1.2

  # Auth
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4
  flutter_secure_storage: ^9.2.2

  # File picking (web + native)
  file_picker: ^8.1.2

  # Map + charts
  flutter_map: ^7.0.0
  flutter_map_cancellable_tile_provider: ^3.0.2
  latlong2: ^0.9.1
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
