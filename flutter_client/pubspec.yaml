name: viewtrip_client
description: ViewTripWeb Flutter client — web, Android, iOS.
publish_to: 'none'

version: 0.46.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.2

  # Navigation
  go_router: ^17.1.0

  # State management
  provider: ^6.1.2

  # Auth
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3

  # File picking (web + native)
  file_picker: ^11.0.2

  # Open URLs in browser (Strava OAuth connect)
  url_launcher: ^6.3.0
  url_launcher_web: ^2.3.3
  web: ^1.1.0

  # Native / Web Share API hand-off for social sharing
  share_plus: ^12.0.2

  # Persist user preferences (theme mode)
  shared_preferences: ^2.3.2

  # Typography
  google_fonts: ^8.1.0

  # Color picker
  flutter_colorpicker: ^1.1.0

  # Map + charts
  flutter_map: ^8.3.0
  flutter_map_animations: ^0.10.0
  latlong2: ^0.9.1
  fl_chart: ^1.2.0

  # Device location — encounter location picker defaults to current position
  geolocator: ^14.0.2
  vector_map_tiles: 9.0.0-beta.9
  vector_tile_renderer: ^6.0.0
  cryptography_plus: ^3.0.0
  flutter_secure_storage: ^10.3.1

  # Photo upgrade: EXIF capture time/GPS + image decoding for pHash (pure Dart, web-safe)
  exif: ^3.3.0
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_map:
  suppress_osm_warning: true


