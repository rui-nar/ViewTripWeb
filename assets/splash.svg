<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <!-- Dark background gradient matching GetTracks #0d1b2a → #1b2838 -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
    <!-- Merge glow -->
    <radialGradient id="mergeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- Output track glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="white" stroke-opacity="0.045" stroke-width="1">
    <line x1="0" y1="0"   x2="0"   y2="300"/>
    <line x1="40" y1="0"  x2="40"  y2="300"/>
    <line x1="80" y1="0"  x2="80"  y2="300"/>
    <line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="280" y1="0" x2="280" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
    <line x1="360" y1="0" x2="360" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="440" y1="0" x2="440" y2="300"/>
    <line x1="480" y1="0" x2="480" y2="300"/>
    <line x1="520" y1="0" x2="520" y2="300"/>
    <line x1="560" y1="0" x2="560" y2="300"/>
    <line x1="0" y1="0"   x2="600" y2="0"/>
    <line x1="0" y1="40"  x2="600" y2="40"/>
    <line x1="0" y1="80"  x2="600" y2="80"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="280" x2="600" y2="280"/>
  </g>

  <!-- Sky-blue track -->
  <polyline points="0,28 90,28 160,72 260,72 330,108 420,128 490,148"
    fill="none" stroke="#4fc3f7" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="0" cy="28" r="4.5" fill="#4fc3f7" stroke="#87d9fb" stroke-width="1"/>

  <!-- Red track -->
  <polyline points="0,148 70,148 130,158 210,158 300,152 410,150 490,148"
    fill="none" stroke="#ef5350" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="0" cy="148" r="4.5" fill="#ef5350" stroke="#f47c7a" stroke-width="1"/>

  <!-- Green track -->
  <polyline points="0,268 100,268 165,218 255,198 355,178 430,162 490,148"
    fill="none" stroke="#66bb6a" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="0" cy="268" r="4.5" fill="#66bb6a" stroke="#90cc93" stroke-width="1"/>

  <!-- Purple track -->
  <polyline points="0,198 88,198 148,188 248,174 375,160 435,154 490,148"
    fill="none" stroke="#ab47bc" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="0" cy="198" r="4.5" fill="#ab47bc" stroke="#bf6fcc" stroke-width="1"/>

  <!-- Orange track -->
  <polyline points="0,108 80,108 145,88 235,90 315,114 415,136 490,148"
    fill="none" stroke="#ffa726" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="0" cy="108" r="4.5" fill="#ffa726" stroke="#ffbe5c" stroke-width="1"/>

  <!-- Merged output track (wide glow + bright core) -->
  <line x1="490" y1="148" x2="600" y2="148"
    stroke="white" stroke-opacity="0.12" stroke-width="10"
    stroke-linecap="round"/>
  <line x1="490" y1="148" x2="600" y2="148"
    stroke="white" stroke-opacity="0.27" stroke-width="6"
    stroke-linecap="round"/>
  <line x1="490" y1="148" x2="600" y2="148"
    stroke="white" stroke-opacity="0.86" stroke-width="3"
    stroke-linecap="round"/>

  <!-- Merge node glow circle -->
  <circle cx="490" cy="148" r="14" fill="white" fill-opacity="0.16"
    stroke="white" stroke-opacity="0.31" stroke-width="1"/>
  <!-- Merge node core dot -->
  <circle cx="490" cy="148" r="5" fill="white"/>

  <!-- Title -->
  <text x="30" y="220"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="28" font-weight="bold" fill="white">GetTracks</text>

  <!-- Subtitle -->
  <text x="32" y="246"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="10" fill="#90caf9">Merge · Visualise · Export</text>
</svg>
