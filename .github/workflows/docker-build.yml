name: Build and publish Docker image

on:
  push:
    tags:
      - 'v*'
      
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter Web
        working-directory: flutter_client
        run: |
          flutter pub get
          flutter build web --release --dart-define=APP_VERSION=${{ github.ref_name }} --dart-define=MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }}

      - name: Stage Flutter build output for Docker
        run: cp -r flutter_client/build/web web_client

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/rui-nar/viewtripweb:latest
            ghcr.io/rui-nar/viewtripweb:${{ github.sha }}
            ghcr.io/rui-nar/viewtripweb:${{ github.ref_name }}
